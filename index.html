<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Glowing Liquid Bowl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bowl-wrapper">
        <div class="shadow"></div>
        
        <div class="bowl">
            <div class="liquid">
                <div class="bubbles"></div>
            </div>
        </div>
    </div>

    <script>
        const bubblesContainer = document.querySelector('.bubbles');

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble'); 

            // Dimensioni casuali (tra 5px e 15px)
            const size = Math.random() * 10 + 5;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            // Posizione orizzontale casuale
            bubble.style.left = `${Math.random() * 90}%`;

            // Velocità di salita casuale (tra 2s e 5s)
            bubble.style.animationDuration = `${Math.random() * 3 + 2}s`;

            bubblesContainer.appendChild(bubble);

            // Rimuove la bolla dopo 5 secondi
            setTimeout(() => {
                bubble.remove();
            }, 5000);
        }

        // Genera una nuova bolla ogni 300 millisecondi
        setInterval(createBubble, 300);
    </script>

</body>
</html>
