<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Colora l'interfaccia di Chrome/Safari su mobile per evitare il bianco -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Magic Bowl</title>
</head>
<body>
    
    <!-- Il nuovo Wrapper che scala su mobile -->
    <div class="bowl-wrapper">
        <div class="bowl">
            <div class="liquid">
                <div class="bubbles"></div>
            </div>
        </div>
    </div>

    <!-- Script per le bollicine dinamiche -->
    <script>
        const bubblesContainer = document.querySelector('.bubbles');

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');

            // Dimensioni casuali (tra 5px e 15px)
            const size = Math.random() * 10 + 5;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            // Posizione orizzontale casuale
            bubble.style.left = `${Math.random() * 90}%`;

            // Velocità di salita casuale (tra 2s e 5s)
            bubble.style.animationDuration = `${Math.random() * 3 + 2}s`;

            bubblesContainer.appendChild(bubble);

            // Rimuove la bolla quando l'animazione finisce
            setTimeout(() => {
                bubble.remove();
            }, 5000);
        }

        // Genera una bolla ogni 300 millisecondi
        setInterval(createBubble, 300);
    </script>

</body>
</html>
