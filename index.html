<!DOCTYPE html>

</html>

<head>
  <title>Colorful Glowing Liquid Bowl</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <section>
    <div class="shadow"></div>
    <div class="bowl" id="bowl-container">
      <div class="liquid"></div>
    </div>
  </section>

  <script>
        function createBubble() {
            // 1. Trova la ciotola
            const container = document.getElementById('bowl-container');
            
            // 2. Crea una nuova bollicina dal nulla
            const bubble = document.createElement('span');
            bubble.classList.add('bubble');
            
            // 3. DIMENSIONE CASUALE (Particolato molto piccolo: tra 3 e 7 pixel)
            let size = Math.random() * 4 + 3; 
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            
            // 4. POSIZIONE CASUALE (spostata a destra o a sinistra)
            bubble.style.left = (Math.random() * 80 + 10) + '%';
            
            // 5. VELOCITÀ CASUALE (Movimento lento e denso: ci mettono dai 2 ai 4 secondi)
            let duration = Math.random() * 2 + 2;
            bubble.style.animationDuration = duration + 's';
            
            // 6. Metti la bolla nella ciotola!
            container.appendChild(bubble);
            
            // 7. FONDAMENTALE: Elimina la bolla quando scompare, altrimenti il PC si blocca!
            setTimeout(() => {
                bubble.remove();
            }, duration * 1000);
        }

        // Fai partire una bollicina ogni 400 millisecondi (gorgoglio lento)
        setInterval(createBubble, 400);
    </script>
  
</body>
